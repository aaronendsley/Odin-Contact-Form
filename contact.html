<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="contact.css" />

        <title>Odin Contact Form</title>
    </head>
    <body>
        <header>
            <h1>The Darkshire Inn</h1>
        </header>
        <main>
            <section class="section1">
                <strong>
                    This is not a real Hotel. But if your ever in Azeroth you
                    should check it out. Feel Free to Contact
                </strong>
            </section>
            <section class="section2">
                <form action="/submit" method="POST">
                    <fieldset>
                        <div>
                            <label for="first_name">First Name </label>
                            <input type="text" name="first_name" required />
                        </div>
                        <div>
                            <label for="last_name"> Last Name</label>
                            <input type="text" name="last_name" required />
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" name="email" required />
                        </div>
                        <div>
                            <label for="phone_number">Phone Number</label>
                            <input
                                type="tel"
                                name="phone_number"
                                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                                title="Must Match 999-999-9999"
                                required
                            />
                        </div>
                        <div>
                            <label for="password">Password</label>
                            <input
                                type="password"
                                name="password"
                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}"
                                title="Must contain at least one number, one lowercase, one uppercase letter, one unique character (!@$), and be at least 8 characters long"
                                required
                            />
                        </div>
                        <div>
                            <label for="confirm_password"
                                >Confirm Password</label
                            >
                            <input
                                type="password"
                                name="confirm_password"
                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}"
                                title="Must contain at least one number, one lowercase, one uppercase letter, one unique character (!@$), and be at least 8 characters long"
                                required
                            />
                        </div>

                        <div>
                            <button type="submit">Create Account</button>
                        </div>
                    </fieldset>
                </form>
            </section>
        </main>
    </body>
</html>
